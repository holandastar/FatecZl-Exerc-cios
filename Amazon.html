<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Css/AmazonStyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <title>Amazon</title>
</head>
<body>
  <header>
    <div class="nav-bar-main">
      <div class="nav-bar-left">
        <section class="nav-logo">
          <img src="Imagens/Amazon_logo.png">
        </section>
        <section class="nav-endereco">
          <img src="Imagens/Icon_map.png">
          <section class="nav-endereco-txt">
          <p>A entrega será feita em Boa Vista 01319900</p>
          <h6>Atualizar CEP</h6>
          </section>
        </section>
      </div>
      <div class="nav-bar-center" style="width: 670px;">
        <div class="container-fluid">
          <form class="d-flex" role="search">
          <input class="form-control me-2" type="search" placeholder="Pesquisar Amazon.com.br" aria-label="Search"/>
          <button class="btn btn-outline-success" type="submit">Search</button>
          </form>
        </div>
      </div>
      <div class="nav-bar-right">
        <section>
          <p>Olá, faça seu login</p>
          <h6>Contas e listas</h6>
        </section>
        <section>
          <p>Pedidos</p>
          <h6>e devoluções</h6>
        </section>
        <section class="carrinho">
          <img src="Imagens/amazonCarrinho.png">
          <h6>Carrinho</h6>
        </section>
      </div>
    </div>
    <div class="nav-bar-bottom">
      <section style="display: flex; align-items: center;"><img src="Imagens/navAmazon.png"><h6>Todos</h6></section>
      <section><h6>Vendas na Amazon</h6></section>
      <section><h6>Chega em 15 min</h6></section>
      <section><h6>Ofertas do Dia</h6></section>
      <section><h6>Mais Vendidos</h6></section>
      <section><h6>Games</h6></section>
      <section><h6>Livros</h6></section>
      <section><h6>Música</h6></section>
      <section><h6>Casa</h6></section>
      <section><h6>Eletrônicos</h6></section>
      <section><h6>Brinquedos e Jogos</h6></section>
      <section><h6>Prime</h6></section>
    </div>
  </header>
<div id="carouselExampleControls" class="carousel slide" data-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img class="d-block w-100" src="Imagens/videoframe_4099.png" alt="First slide">
    </div>
    <div class="carousel-item">
      <img class="d-block w-100" src="https://m.media-amazon.com/images/I/81JLsxekb6L._SX3000_.jpg" alt="Second slide">
    </div>
    <div class="carousel-item">
      <img class="d-block w-100" src="https://m.media-amazon.com/images/I/81M0q2YsJGL._SX3000_.jpg" alt="Third slide">
    </div>
  </div>
  <a class="carousel-control-prev" href="#carouselExampleControls" role="button" data-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="sr-only">Previous</span>
  </a>
  <a class="carousel-control-next" href="#carouselExampleControls" role="button" data-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="sr-only">Next</span>
  </a>
</div>
</body>
</html>
